<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大富翁：资本帝国复利版</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 隐藏所有滚动条，保持游戏全屏沉浸感 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-gray-100 bg-slate-950 p-2 md:p-4 font-sans antialiased min-h-screen flex flex-col justify-center items-center overflow-hidden">

  <!-- 游戏主容器 -->
  <div id="app" class="w-full h-full flex items-center justify-center max-w-[1800px] mx-auto">
    
    <!-- 1. 游戏初始化/角色选择界面 -->
    <div id="setup-screen" class="max-w-2xl mx-auto my-auto bg-slate-900/95 rounded-[2.5rem] p-6 md:p-10 shadow-2xl border border-slate-800 backdrop-blur-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-black bg-gradient-to-r from-emerald-400 via-teal-500 to-cyan-500 bg-clip-text text-transparent filter drop-shadow">
          大富翁：资本帝国
        </h1>
        <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest font-bold">16x9 自适应宽幅实景沙盘模式</p>
      </div>

      <!-- 游戏全局规则参数微调 -->
      <div class="grid grid-cols-2 gap-4 bg-slate-950/60 p-5 rounded-2xl border border-slate-850 mb-6 shadow-inner">
        <div>
          <label class="block text-[11px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">初始流动资金</label>
          <input type="number" id="init-cash" value="50000" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm font-bold text-emerald-400 focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-[11px] font-black text-slate-400 uppercase mb-1.5 tracking-wider">起点周转红利</label>
          <input type="number" id="start-bonus" value="10000" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm font-bold text-amber-400 focus:outline-none focus:border-cyan-400">
        </div>
      </div>

      <div class="mb-6 bg-slate-900 border border-slate-800 p-4 rounded-xl text-xs text-slate-400 space-y-2 leading-relaxed">
        <div class="font-bold text-emerald-400 mb-1">⚖️ 资本复利法则：</div>
        <div>1. 城市地价分为极品至平民四档: <span class="text-white font-bold">$3500, $3000, $2500, $2000</span>。</div>
        <div>2. 基础过路费始终维持为当前地价的 <span class="text-white font-bold">10%</span>。升级不设上限。</div>
        <div>3. <span class="text-amber-400 font-bold">资产利息</span>：回合开始时自动获取总资产 <span class="text-white">1%</span> 的无风险利息。</div>
        <div>4. <span class="text-purple-400 font-bold">命运转盘</span>：所有命运黑天鹅事件按总资产的 <span class="text-white">5%</span> 动态核算。</div>
      </div>

      <!-- 动态分配容器 -->
      <div class="space-y-3" id="player-setup-list"></div>

      <button onclick="startGame()" class="w-full mt-8 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-slate-950 font-black text-base py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(16,185,129,0.25)]">
        签 署 契 约 ， 開 局
      </button>
    </div>

    <!-- 2. 核心大游戏主战场界面 -->
    <div id="game-screen" class="hidden w-full flex items-center justify-center overflow-hidden">
      
      <!-- 采用 16列 x 9行 完美比例，使用底层 inline-style 彻底锁死物理网格，防范 Tailwind 解析失效 -->
      <div id="board-container" class="grid gap-0.5 sm:gap-1 p-1 bg-slate-950 border border-slate-900 rounded-[1.25rem] relative w-full aspect-video max-h-[96vh] shadow-2xl"
           style="grid-template-columns: repeat(16, minmax(0, 1fr)); grid-template-rows: repeat(9, minmax(0, 1fr));">
        
        <!-- ==========================================
             中央指挥大厅：物理锁死坐标 (跨列 2~15，跨行 2~8)，绝对不与右侧城市重叠！
             ========================================== -->
        <div class="bg-slate-900/90 border border-slate-850 rounded-xl p-3 sm:p-5 grid grid-cols-12 gap-3 sm:gap-5 overflow-hidden shadow-[inset_0_0_30px_rgba(0,0,0,0.6)] z-0 relative"
             style="grid-column: 2 / 16; grid-row: 2 / 9;">
          
          <!-- 大厅左侧：排行榜 (占据 4 列，约 33% 宽度，纵向填满) -->
          <div class="col-span-4 flex flex-col h-full bg-slate-950/60 p-3.5 border border-slate-800/80 rounded-xl overflow-hidden shadow-inner">
            <div class="text-xs lg:text-sm font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-800/80 pb-3 flex justify-between shrink-0">
              <span>🏆 财阀资产排行榜</span>
              <span class="text-emerald-400 animate-pulse text-[10px]">复利运转中</span>
            </div>
            <!-- 排行榜卡片列表 (利用 flex-grow 无限延伸填补底部黑边) -->
            <div id="player-ranks" class="flex-grow flex flex-col gap-2.5 overflow-y-auto no-scrollbar">
              <!-- JS 动态注入 -->
            </div>
          </div>

          <!-- 大厅右侧：行动中枢 + 战局日志 (占据 8 列，约 66% 宽度) -->
          <div class="col-span-8 flex flex-col h-full gap-3 sm:gap-5">
            
            <!-- 🎲 掷骰行动面板 (高度压缩，留空间给日志) -->
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow-lg shrink-0">
              
              <div class="flex items-center gap-3 lg:gap-4 shrink-0 pl-2">
                <div id="current-player-avatar" class="text-4xl lg:text-5xl filter drop-shadow">👧</div>
                <div>
                  <span class="text-[10px] text-slate-500 uppercase font-black block tracking-widest">当前行动方</span>
                  <span id="current-player-name" class="text-sm lg:text-lg font-black text-white block mt-0.5">加载中...</span>
                </div>
              </div>

              <!-- 骰子与操作按钮 -->
              <div class="flex items-center gap-3 lg:gap-4 pr-2">
                <div id="dice-element" class="w-12 h-12 lg:w-16 lg:h-16 bg-gradient-to-br from-slate-800 to-slate-900 border-2 border-slate-700 text-white text-2xl lg:text-3xl font-black rounded-xl flex items-center justify-center shadow-lg select-none cursor-pointer">🎲</div>
                <div class="flex flex-col gap-1.5 lg:gap-2 w-28 lg:w-32">
                  <button id="btn-roll" onclick="triggerDiceRoll()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-slate-950 font-black text-[11px] lg:text-xs px-2 py-1.5 lg:py-2.5 rounded-lg transition-all shadow-md">
                    🎲 开始掷骰
                  </button>
                  <button id="btn-end-turn" onclick="endTurn()" disabled class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 disabled:opacity-30 font-black text-[11px] lg:text-xs px-2 py-1.5 lg:py-2.5 rounded-lg transition-all">
                    ⏭ 结束回合
                  </button>
                </div>
              </div>
            </div>

            <!-- 📜 战局实时日志 (flex-grow 自动向下填满所有剩余空间) -->
            <div class="bg-slate-950/80 border border-slate-850 p-4 rounded-xl flex flex-col flex-grow min-h-0 shadow-xl">
              <div class="text-[10px] lg:text-xs font-black text-slate-500 uppercase mb-3 flex justify-between items-center border-b border-slate-850 pb-3 shrink-0">
                <span id="quick-tip" class="text-cyan-400">系统：准备掷骰</span>
                <button onclick="clearLogs()" class="hover:text-white text-slate-400 text-[9px] lg:text-[10px] bg-slate-800 px-3 py-1.5 rounded transition-all">清空记录</button>
              </div>
              <!-- 这里加了 pr-2 防止文字太贴右边，并且通过 no-scrollbar 隐藏滚动条 -->
              <div id="game-logs" class="flex-grow overflow-y-auto text-[10px] lg:text-[11px] space-y-1.5 text-slate-400 no-scrollbar pr-2"></div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 地产购置 / 加盖 复利机制弹窗 -->
  <div id="property-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-slate-900 border border-slate-800 rounded-[2rem] p-6 max-w-sm w-full shadow-2xl relative">
      <div id="prop-color-bar" class="h-3 w-full rounded-full mb-5 bg-gradient-to-r from-emerald-500 to-teal-500"></div>
      <h3 class="text-xl font-black text-white mb-1" id="prop-title">城市收购案</h3>
      <p class="text-xs text-slate-400 leading-relaxed mb-5" id="prop-desc">加载中...</p>
      
      <div class="bg-slate-950/80 p-4 rounded-2xl border border-slate-850 space-y-3 mb-5 text-xs font-bold font-mono">
        <div class="flex justify-between"><span class="text-slate-500" id="modal-label-1">当前地价 / 等级</span><span class="text-slate-200" id="prop-val-1">$0</span></div>
        <div class="flex justify-between"><span class="text-slate-500" id="modal-label-2">所需交易资金</span><span class="text-emerald-400 text-sm" id="prop-val-2">$0</span></div>
        <div class="flex justify-between pt-2 border-t border-slate-800/80"><span class="text-slate-500" id="modal-label-3">建成后过路费(10%)</span><span class="text-rose-400 text-sm" id="prop-val-3">$0</span></div>
      </div>

      <div class="flex gap-3">
        <button onclick="confirmPropertyAction(false)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-all text-xs">
          放弃契机
        </button>
        <button id="prop-confirm-btn" onclick="confirmPropertyAction(true)" class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-3 rounded-xl transition-all text-xs shadow-lg">
          确认交易
        </button>
      </div>
    </div>
  </div>

  <!-- 命运/机会 弹窗 -->
  <div id="event-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-slate-900 border border-slate-800 rounded-[2rem] p-6 max-w-sm w-full shadow-2xl text-center">
      <div class="text-5xl mb-3" id="event-modal-icon">🎰</div>
      <h3 class="text-xl font-black text-cyan-300" id="event-modal-title">命运抉择</h3>
      <div class="my-5 bg-slate-950/60 p-4 rounded-2xl text-xs leading-relaxed text-slate-300 min-h-[60px] flex items-center justify-center font-medium text-left border border-slate-850" id="event-modal-text">
        加载中...
      </div>
      <button onclick="closeEventModal()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-400 hover:to-indigo-500 text-white font-black py-3 rounded-xl transition-all text-xs shadow-md">
        遵从命运指引
      </button>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
